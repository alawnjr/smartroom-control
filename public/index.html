<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smartroom</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo"><span class="logo-dot"></span></span>
        <span class="brand">Smartroom</span>
        <nav class="tabs" id="tabs">
          <button data-tab="analytics" class="on">analytics</button>
          <button data-tab="classes">classes</button>
        </nav>
      </div>
      <div class="topbar-right">
        <span class="clock" id="clock"></span>
      </div>
    </header>

    <!-- Live view + recording moved to the nodes' own pages
         (http://smartroom<N>.local:8000 — Record ALL nodes button there). -->

    <main id="tab-analytics" hidden>
      <div class="toolbar" id="an-toolbar"></div>
      <div id="an-sessions"></div>
    </main>

    <main id="tab-classes" hidden>
      <div id="classes-root"></div>
    </main>
  </div>

  <div id="drawer-host"></div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
