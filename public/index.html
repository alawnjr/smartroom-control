<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smartroom</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo"><span class="logo-dot"></span></span>
        <span class="brand">Smartroom</span>
        <nav class="tabs" id="tabs">
          <button data-tab="live" class="on">live</button>
          <button data-tab="analytics">analytics</button>
          <button data-tab="classes">classes</button>
        </nav>
      </div>
      <div class="topbar-right">
        <span class="pill pill-live" id="pill-live">0 rooms live</span>
        <span class="pill pill-rolling" id="pill-rolling" hidden><span class="dot dot-pulse dot-rose"></span> <span id="rolling-n"></span> rolling</span>
        <span class="clock" id="clock"></span>
      </div>
    </header>

    <main id="tab-live">
      <h2 class="h2">The rooms right now</h2>
      <div class="live-grid">
        <div class="rooms-grid" id="rooms"></div>
        <div class="card pad" id="ready">
          <div class="h1">Ready to roll?</div>
          <div class="sub">Captures every online room in sync.</div>
          <div class="label-sm">How long?</div>
          <div class="stepper">
            <button id="dur-minus">−</button>
            <div class="stepper-val" id="dur-val">30s</div>
            <button id="dur-plus">+</button>
          </div>
          <button class="btn btn-record" id="btn-record">Record everything</button>
          <button class="btn btn-stop" id="btn-stop" disabled>Stop recording</button>
          <button class="btn btn-beam" id="btn-beam">⤓ Beam to laptop</button>
          <div id="analyze-stats"></div>
        </div>
      </div>
      <h2 class="h2" id="depth-h2" hidden>Depth cameras</h2>
      <div class="rooms-grid" id="depth-cams" hidden></div>
    </main>

    <main id="tab-analytics" hidden>
      <div class="toolbar" id="an-toolbar"></div>
      <div id="an-sessions"></div>
    </main>

    <main id="tab-classes" hidden>
      <div id="classes-root"></div>
    </main>
  </div>

  <div id="drawer-host"></div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
